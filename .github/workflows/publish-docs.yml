name: Publish Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '_extensions/**'
      - '.github/workflows/publish-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Copy extension to docs
        run: |
          cp -r _extensions docs/
          cp image.png docs/
          cp demo-text.gif docs/

      - name: Render embedded example
        run: |
          cd docs
          quarto render example.qmd

      - name: Render docs
        run: |
          cd docs
          quarto render

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
