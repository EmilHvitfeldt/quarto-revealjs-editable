name: Test Extension

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Shell tests run on all platforms
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup symlink (Unix)
        if: runner.os != 'Windows'
        run: |
          cd testing
          ln -sf ../_extensions _extensions

      - name: Setup symlink (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd testing
          mklink /D _extensions ..\_extensions

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x testing/run-tests.sh
          testing/run-tests.sh

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd testing
          chmod +x run-tests.sh
          ./run-tests.sh

  # Playwright E2E tests run only on Ubuntu (JS behavior is cross-platform)
  e2e:
    runs-on: ubuntu-latest
    needs: test  # Run after shell tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache rendered HTML files
        id: cache-html
        uses: actions/cache@v4
        with:
          path: |
            testing/*.html
            testing/*_files
          key: html-${{ hashFiles('_extensions/**', 'testing/*.qmd', 'testing/*.yml') }}

      - name: Setup symlink
        run: |
          cd testing
          ln -sf ../_extensions _extensions

      - name: Render test files
        if: steps.cache-html.outputs.cache-hit != 'true'
        run: |
          cd testing
          chmod +x run-tests.sh
          ./run-tests.sh

      - name: Install Playwright
        run: |
          cd testing
          npm install
          npx playwright install chromium

      - name: Run Playwright tests
        run: |
          cd testing
          npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: testing/test-results/
          retention-days: 7
